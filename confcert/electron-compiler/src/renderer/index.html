<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self'; worker-src 'self' blob:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../../assets/final_icon.png" />
  <title>Solidity Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0: #050913;
      --bg-1: #0a1222;
      --bg-2: #111b31;
      --bg-3: #1a2942;
      --surface-1: rgba(17, 24, 39, 0.9);
      --surface-2: rgba(22, 33, 55, 0.92);
      --border: rgba(148, 163, 184, 0.24);
      --border-strong: rgba(148, 163, 184, 0.42);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-muted: #64748b;
      --text3: #64748b;
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.14);
      --yellow: #f59e0b;
      --yellow-dim: rgba(245, 158, 11, 0.15);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.15);
      --blue: #3b82f6;
      --blue-dim: rgba(59, 130, 246, 0.15);
      --cyan: #06b6d4;
      --purple: #a78bfa;
      --radius: 14px;
      --shadow: 0 18px 34px rgba(2, 6, 23, 0.45);
      --mono: Consolas, Monaco, "Courier New", monospace;
      --sans: "Segoe UI", "Inter", "Helvetica Neue", Arial, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 12%, rgba(56, 189, 248, 0.18), transparent 32%),
        radial-gradient(circle at 85% 0%, rgba(59, 130, 246, 0.16), transparent 30%),
        radial-gradient(circle at 60% 88%, rgba(168, 85, 247, 0.1), transparent 34%),
        linear-gradient(160deg, var(--bg-0), var(--bg-1) 38%, var(--bg-2) 100%);
      color: var(--text);
      font-family: var(--sans);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 14px 16px, rgba(148, 163, 184, 0.45), transparent 70%),
        radial-gradient(1px 1px at 70px 88px, rgba(148, 163, 184, 0.36), transparent 70%),
        radial-gradient(1px 1px at 130px 40px, rgba(148, 163, 184, 0.4), transparent 70%);
      background-size: 170px 170px;
      opacity: 0.28;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      height: 56px;
      background: rgba(15, 23, 42, 0.78);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
      -webkit-app-region: drag;
      user-select: none;
    }

    header .logo { display: flex; align-items: center; gap: 10px; }
    header .logo img {
      width: 34px;
      height: 34px;
      border-radius: 11px;
      border: 1px solid rgba(96, 165, 250, 0.45);
      box-shadow: 0 8px 18px rgba(2, 6, 23, 0.45);
    }
    header .logo-text { font-weight: 700; font-size: 15px; letter-spacing: -0.2px; color: var(--text); }
    header .logo-text span { color: #60a5fa; }
    header .spacer { flex: 1; }

    header .app-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
      user-select: auto;
    }

    header .beta-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid rgba(245, 158, 11, 0.55);
      background: rgba(245, 158, 11, 0.16);
      color: #fde68a;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      padding: 4px 9px;
      line-height: 1;
    }

    header .feedback-link {
      color: #93c5fd;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 8px;
      border-radius: 9px;
      border: 1px solid rgba(59, 130, 246, 0.32);
      background: rgba(30, 58, 138, 0.2);
      transition: border-color 0.15s, color 0.15s, background-color 0.15s;
    }

    header .feedback-link:hover {
      color: #dbeafe;
      border-color: rgba(96, 165, 250, 0.55);
      background: rgba(30, 64, 175, 0.35);
    }

    .workspace {
      display: flex;
      flex: 1;
      gap: 14px;
      padding: 14px;
      overflow: hidden;
    }

    .sidebar {
      width: 332px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      padding-right: 4px;
      background: transparent;
      border-right: none;
    }

    .sidebar-section {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, var(--surface-2), var(--surface-1));
      box-shadow: var(--shadow);
    }

    .section-title {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }

    .inp {
      width: 100%;
      padding: 8px 10px;
      border-radius: 11px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.7);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .inp:focus {
      border-color: rgba(59, 130, 246, 0.72);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    .inp::placeholder { color: var(--text-muted); }

    label.field-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .field-wrap { margin-bottom: 10px; }
    select.inp { cursor: pointer; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 14px;
      border-radius: 12px;
      border: none;
      font-family: var(--sans);
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.14s, filter 0.14s;
      width: 100%;
      margin-bottom: 6px;
    }

    .btn:last-child { margin-bottom: 0; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.06); }

    .btn-compile { background: linear-gradient(135deg, #d97706, #f59e0b); color: #fff; }
    .btn-deploy  { background: linear-gradient(135deg, #16a34a, #22c55e); color: #fff; }
    .btn-run     { background: linear-gradient(135deg, #2563eb, #3b82f6); color: #fff; }

    .btn-reset {
      background: rgba(15, 23, 42, 0.86);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .btn-reset:hover:not(:disabled) { color: var(--text); border-color: var(--border-strong); }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 0; }
    .btn-row .btn { margin-bottom: 0; }

    .file-meta {
      margin-top: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 11px;
      color: var(--text-dim);
      background: rgba(15, 23, 42, 0.5);
      font-family: var(--mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .deploy-badge {
      border-radius: 12px;
      padding: 10px;
      background: var(--green-dim);
      border: 1px solid rgba(34, 197, 94, 0.45);
      margin-bottom: 10px;
    }

    .deploy-badge .label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: #86efac;
      letter-spacing: 0.6px;
    }

    .deploy-badge .addr {
      font-family: var(--mono);
      font-size: 11px;
      color: #dcfce7;
      word-break: break-all;
      margin-top: 3px;
    }

    .deploy-badge .name { font-size: 11px; color: #86efac; margin-top: 2px; }

    .accounts-list { list-style: none; }

    .accounts-list li {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      padding: 4px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      cursor: pointer;
      transition: color 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .accounts-list li:hover { color: #93c5fd; }
    .accounts-list li.selected { color: #67e8f9; }
    .accounts-list li:last-child { border-bottom: none; }

    .compiler-info {
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 10px;
      margin-top: 10px;
    }

    .compiler-info .ci-name { font-size: 12px; font-weight: 700; color: var(--text); }
    .compiler-info .ci-warn { font-size: 11px; color: #fcd34d; margin-top: 2px; }

    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(40, 44, 52, 0.94), rgba(33, 37, 43, 0.9));
      box-shadow: var(--shadow);
    }

    #editor-mount {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: #282c34;
      position: relative;
    }

    .plain-editor {
      width: 100%;
      height: 100%;
      resize: none;
      border: none;
      outline: none;
      background: #282c34;
      color: #abb2bf;
      font: 13px/1.55 var(--mono);
      padding: 14px;
      tab-size: 4;
    }

    .plain-editor::selection { background: #3e4451; }

    .plain-editor.hidden { display: none; }

    .terminal-panel {
      height: 230px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #0b1324;
      border-top: 1px solid var(--border);
    }

    .terminal-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(15, 23, 42, 0.95);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .terminal-header .t-title {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
    }

    .term-clear {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 11px;
      font-family: var(--sans);
      transition: color 0.15s;
    }

    .term-clear:hover { color: var(--text); }

    #terminal-output {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.6;
      scroll-behavior: smooth;
    }

    #terminal-output::-webkit-scrollbar { width: 7px; }
    #terminal-output::-webkit-scrollbar-track { background: transparent; }
    #terminal-output::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.45);
      border-radius: 999px;
    }

    .log-line { display: flex; gap: 8px; padding: 1px 0; }
    .log-time { color: var(--text-muted); flex-shrink: 0; }
    .log-msg.info    { color: var(--text-dim); }
    .log-msg.success { color: #86efac; }
    .log-msg.warning { color: #fde68a; }
    .log-msg.error   { color: #fca5a5; }
    .log-msg.result  { color: #67e8f9; }
    .log-msg.event   { color: #c4b5fd; }

    .log-prefix { font-weight: 700; flex-shrink: 0; }
    .log-prefix.info    { color: #93c5fd; }
    .log-prefix.success { color: #4ade80; }
    .log-prefix.warning { color: #fbbf24; }
    .log-prefix.error   { color: #ef4444; }
    .log-prefix.result  { color: #22d3ee; }
    .log-prefix.event   { color: #a78bfa; }

    .log-details {
      margin-top: 2px;
      margin-left: 56px;
      margin-bottom: 4px;
      background: rgba(15, 23, 42, 0.85);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 11px;
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-all;
      border-left: 2px solid rgba(96, 165, 250, 0.45);
    }

    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      background: rgba(15, 23, 42, 0.98);
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text);
      box-shadow: var(--shadow);
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
    }

    #toast.show { transform: translateY(0); opacity: 1; }

    .sidebar::-webkit-scrollbar { width: 6px; }
    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.48);
      border-radius: 999px;
    }

    .empty-state {
      padding: 12px;
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    @media (max-width: 1200px) {
      .sidebar { width: 302px; }
    }

    @media (max-width: 980px) {
      header {
        height: auto;
        padding: 10px 14px;
        flex-wrap: nowrap;
      }

      .workspace {
        flex-direction: column;
        padding: 10px;
      }

      .sidebar {
        width: 100%;
        max-height: 45vh;
        padding-right: 0;
      }

      .editor-area {
        min-height: 0;
        height: 55vh;
      }
    }

    @media (max-width: 768px) {
      .workspace {
        gap: 8px;
        padding: 8px;
      }

      .sidebar {
        max-height: none;
      }

      .sidebar-section {
        padding: 10px;
        border-radius: 12px;
      }

      .terminal-panel {
        height: 190px;
      }
    }

    @media (max-width: 560px) {
      header .logo img {
        width: 30px;
        height: 30px;
      }

      header .logo-text {
        font-size: 13px;
      }

      .btn {
        font-size: 12px;
        padding: 8px 10px;
      }

      .btn-row {
        grid-template-columns: 1fr;
      }

      .terminal-panel {
        height: 170px;
      }

      header .feedback-link {
        font-size: 11px;
        padding: 4px 7px;
      }

      header .beta-pill {
        font-size: 9px;
        padding: 4px 7px;
      }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header>
    <div class="logo">
      <img src="../../assets/final_icon.png" alt="Blockwave Icon" />
      <span class="logo-text"><span>Solidity</span> Playground</span>
    </div>
    <div class="spacer"></div>
    <div class="app-status" title="This app is in beta and might contain bugs.">
      <span class="beta-pill">Beta</span>
      <a
        class="feedback-link"
        href="https://smartcontractsbyamar.vercel.app/feedback"
        target="_blank"
        rel="noreferrer"
      >
        Send Feedback
      </a>
    </div>
  </header>

  <div class="workspace">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">

      <!-- File actions -->
      <div class="sidebar-section">
        <div class="section-title"><span class="dot" style="background:var(--cyan)"></span>File</div>

        <div class="btn-row" style="margin-bottom:6px;">
          <button class="btn btn-reset" id="btn-open">Open .sol</button>
          <button class="btn btn-reset" id="btn-save">Save</button>
        </div>

        <button class="btn btn-reset" id="btn-save-as">Save As .sol</button>
        <div class="file-meta" id="current-file" title="Unsaved document">File: Unsaved document</div>
      </div>

      <!-- Compile & Deploy -->
      <div class="sidebar-section">
        <div class="section-title"><span class="dot" style="background:var(--yellow)"></span>Compile & Deploy</div>

        <div id="contract-select-wrap" class="field-wrap" style="display:none;">
          <label class="field-label">Select Contract</label>
          <select id="contract-select" class="inp">
            <option value="">Auto-select deployable</option>
          </select>
        </div>

        <div id="constructor-args-wrap"></div>

        <div class="btn-row">
          <button class="btn btn-compile" id="btn-compile">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            Compile
          </button>
          <button class="btn btn-deploy" id="btn-deploy">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Deploy
          </button>
        </div>

        <div id="compiler-meta" style="display:none;" class="compiler-info">
          <div class="ci-name" id="ci-name"></div>
          <div class="ci-warn" id="ci-warn"></div>
        </div>
      </div>

      <!-- Active deployment info -->
      <div class="sidebar-section" id="deployment-section" style="display:none;">
        <div class="section-title"><span class="dot" style="background:var(--green)"></span>Active Deployment</div>
        <div class="deploy-badge">
          <div class="label">Contract Address</div>
          <div class="addr" id="deploy-addr"></div>
          <div class="name" id="deploy-name"></div>
        </div>
        <div>
          <label class="field-label">Sender Account</label>
          <ul class="accounts-list" id="accounts-list"></ul>
        </div>
      </div>

      <!-- Function Tester -->
      <div class="sidebar-section">
        <div class="section-title"><span class="dot" style="background:var(--blue)"></span>Function Tester</div>

        <div id="fn-no-deploy" class="empty-state">Deploy a contract first.</div>

        <div id="fn-controls" style="display:none;">
          <div class="field-wrap">
            <label class="field-label">Function</label>
            <select id="fn-select" class="inp">
              <option value="">Select a function…</option>
            </select>
          </div>

          <div id="fn-args-wrap"></div>

          <div id="fn-payable-wrap" class="field-wrap" style="display:none;">
            <label class="field-label">Value (wei)</label>
            <input id="fn-value" type="text" value="0" class="inp" placeholder="0" />
          </div>

          <div class="btn-row" style="margin-bottom:0;">
            <button class="btn btn-run" id="btn-run">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Run
            </button>
            <button class="btn btn-reset" id="btn-reset">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.62"/></svg>
              Reset
            </button>
          </div>
        </div>
      </div>

    </aside>

    <!-- ── Editor + Terminal ── -->
    <div class="editor-area">
      <div id="editor-mount"></div>

      <!-- Terminal -->
      <div class="terminal-panel">
        <div class="terminal-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2.5"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          <span class="t-title">Terminal</span>
          <button class="term-clear" id="btn-clear-terminal">clear</button>
        </div>
        <div id="terminal-output"></div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<!-- Monaco loader from app dependencies (offline-safe) -->
<script src="../../node_modules/monaco-editor/min/vs/loader.js"></script>
<script src="renderer.js"></script>
</body>
</html>
