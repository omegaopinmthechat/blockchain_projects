<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self'; worker-src 'self' blob:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../../assets/final_icon.png" />
  <title>Solidity Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --radius: 4px;
      --mono: Consolas, "Courier New", monospace;
      --sans: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      --ui-font-size: 18px;
      --editor-font-size: 13px;
      --editor-font-family: Consolas, "Courier New", monospace;
      --sidebar-scale: 1;
      --terminal-scale: 1;
      --terminal-height: 220px;
    }

    body[data-theme="dark"] {
      --app-bg: #1e1e1e;
      --header-bg: #2d2d30;
      --sidebar-bg: #252526;
      --panel-bg: #252526;
      --panel-bg-alt: #2a2d2e;
      --panel-muted: #1f1f1f;
      --editor-bg: #1e1e1e;
      --terminal-bg: #1e1e1e;
      --input-bg: #3c3c3c;
      --input-border: #5a5a5a;
      --input-text: #cccccc;
      --input-focus: #007acc;
      --border: #3c3c3c;
      --border-strong: #4f4f4f;
      --text: #cccccc;
      --text-dim: #a9a9a9;
      --text-muted: #808080;
      --button-primary: #0e639c;
      --button-primary-hover: #1177bb;
      --button-success: #388a34;
      --button-success-hover: #3e9739;
      --button-muted: #3c3c3c;
      --button-muted-hover: #4a4a4a;
      --status-success: #89d185;
      --status-warning: #d7ba7d;
      --status-error: #f48771;
      --status-result: #4fc1ff;
      --status-event: #c586c0;
      --editor-text: #d4d4d4;
      --selection-bg: #264f78;
    }

    body[data-theme="light"] {
      --app-bg: #e6e7ed;
      --header-bg: #d6d8df;
      --sidebar-bg: #d6d8df;
      --panel-bg: #e6e7ed;
      --panel-bg-alt: #dcdee3;
      --panel-muted: #d6d8df;
      --editor-bg: #e6e7ed;
      --terminal-bg: #d6d8df;
      --input-bg: #e6e7ed;
      --input-border: #c1c2c7;
      --input-text: #363c4d;
      --input-focus: #2959aa;
      --border: #c1c2c7;
      --border-strong: #9da0ab;
      --text: #363c4d;
      --text-dim: #4a5272;
      --text-muted: #707280;
      --button-primary: #2959aa;
      --button-primary-hover: #3d59a1;
      --button-success: #33635c;
      --button-success-hover: #296973;
      --button-muted: #d6d8df;
      --button-muted-hover: #cdced1;
      --status-success: #33635c;
      --status-warning: #8f5e15;
      --status-error: #8c4351;
      --status-result: #2959aa;
      --status-event: #7b43ba;
      --editor-text: #343b59;
      --selection-bg: #acb0bf40;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--app-bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: var(--ui-font-size);
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 0 0 14px;
      height: 48px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      -webkit-app-region: drag;
      user-select: none;
    }

    header .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .logo img {
      width: 26px;
      height: 26px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    header .logo-text {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      letter-spacing: 0;
    }

    header .logo-text span { color: var(--text); }
    header .spacer { flex: 1; }

    header .app-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
      user-select: auto;
    }

    header .beta-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      border: 1px solid var(--border-strong);
      background: var(--panel-bg-alt);
      color: var(--text-dim);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 3px 6px;
      line-height: 1;
    }

    header .feedback-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: var(--panel-bg-alt);
      transition: border-color 0.15s, color 0.15s, background-color 0.15s;
    }

    header .feedback-link:hover {
      color: var(--text);
      border-color: var(--border-strong);
      background: var(--panel-bg);
    }

    header .window-controls {
      display: inline-flex;
      align-items: stretch;
      align-self: stretch;
      margin-left: 8px;
      -webkit-app-region: no-drag;
      user-select: none;
    }

    header .window-btn {
      width: 46px;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-dim);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.12s, color 0.12s;
    }

    header .window-btn:hover {
      background: var(--panel-bg-alt);
      color: var(--text);
    }

    header .window-btn.close-btn:hover {
      background: #c42b1c;
      color: #ffffff;
    }

    header .window-btn svg {
      width: 10px;
      height: 10px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: square;
      vector-effect: non-scaling-stroke;
    }

    header .window-btn.is-hidden {
      display: none;
    }

    .workspace {
      display: flex;
      flex: 1;
      gap: 8px;
      padding: 8px;
      overflow: hidden;
      background: var(--app-bg);
    }

    .sidebar {
      width: 336px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      padding-right: 2px;
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px;
    }

    .sidebar-section {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel-bg);
    }

    .section-title {
      font-size: calc(11px * var(--sidebar-scale));
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-title .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .inp {
      width: 100%;
      padding: 7px 9px;
      border-radius: 3px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--input-text);
      font-family: var(--sans);
      font-size: calc(12px * var(--sidebar-scale));
      outline: none;
      transition: border-color 0.15s;
    }

    .inp:focus {
      border-color: var(--input-focus);
    }

    .inp::placeholder { color: var(--text-muted); }
    select.inp { cursor: pointer; }

    .inp.slider {
      padding: 0;
      height: 18px;
      border: none;
      background: transparent;
      accent-color: var(--input-focus);
    }

    label.field-label {
      display: block;
      font-size: calc(11px * var(--sidebar-scale));
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .field-label .value {
      float: right;
      color: var(--text-muted);
      font-weight: 600;
    }

    .field-help {
      margin-top: 4px;
      font-size: calc(11px * var(--sidebar-scale));
      color: var(--text-muted);
    }

    .field-wrap { margin-bottom: 10px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 3px;
      border: 1px solid transparent;
      font-family: var(--sans);
      font-weight: 600;
      font-size: calc(12px * var(--sidebar-scale));
      cursor: pointer;
      width: 100%;
      margin-bottom: 6px;
      transition: background-color 0.15s, border-color 0.15s;
    }

    .btn:last-child { margin-bottom: 0; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-compile,
    .btn-run {
      background: var(--button-primary);
      color: #ffffff;
    }

    .btn-compile:hover:not(:disabled),
    .btn-run:hover:not(:disabled) {
      background: var(--button-primary-hover);
    }

    .btn-deploy {
      background: var(--button-success);
      color: #ffffff;
    }

    .btn-deploy:hover:not(:disabled) {
      background: var(--button-success-hover);
    }

    .btn-reset {
      background: var(--button-muted);
      color: var(--text);
      border-color: var(--border);
    }

    .btn-reset:hover:not(:disabled) {
      background: var(--button-muted-hover);
      border-color: var(--border-strong);
    }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 0; }
    .btn-row .btn { margin-bottom: 0; }

    .file-meta {
      margin-top: 8px;
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: calc(11px * var(--sidebar-scale));
      color: var(--text-dim);
      background: var(--panel-bg-alt);
      font-family: var(--mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.45);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .deploy-badge {
      border-radius: 3px;
      padding: 8px;
      background: var(--panel-bg-alt);
      border: 1px solid var(--border);
      margin-bottom: 10px;
    }

    .deploy-badge .label {
      font-size: calc(10px * var(--sidebar-scale));
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .deploy-badge .addr {
      font-family: var(--mono);
      font-size: calc(11px * var(--sidebar-scale));
      color: var(--text);
      word-break: break-all;
      margin-top: 3px;
    }

    .deploy-badge .name {
      font-size: calc(11px * var(--sidebar-scale));
      color: var(--text-dim);
      margin-top: 2px;
    }

    .accounts-list { list-style: none; }

    .accounts-list li {
      font-family: var(--mono);
      font-size: calc(10px * var(--sidebar-scale));
      color: var(--text-dim);
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: color 0.12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .accounts-list li:hover { color: var(--text); }
    .accounts-list li.selected { color: var(--button-primary); }
    .accounts-list li:last-child { border-bottom: none; }

    .compiler-info {
      background: var(--panel-bg-alt);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px 9px;
      margin-top: 10px;
    }

    .compiler-info .ci-name {
      font-size: calc(12px * var(--sidebar-scale));
      font-weight: 600;
      color: var(--text);
    }

    .compiler-info .ci-warn {
      font-size: calc(11px * var(--sidebar-scale));
      color: var(--status-warning);
      margin-top: 2px;
    }

    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--panel-bg);
    }

    #editor-mount {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: var(--editor-bg);
      position: relative;
    }

    .plain-editor {
      width: 100%;
      height: 100%;
      resize: none;
      border: none;
      outline: none;
      background: var(--editor-bg);
      color: var(--editor-text);
      font: var(--editor-font-size)/1.55 var(--editor-font-family);
      padding: 12px;
      tab-size: 4;
    }

    .plain-editor::selection { background: var(--selection-bg); }
    .plain-editor.hidden { display: none; }

    .terminal-panel {
      height: var(--terminal-height);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--terminal-bg);
      border-top: 1px solid var(--border);
      overflow: hidden;
      transition: height 0.14s ease;
    }

    .terminal-panel.is-collapsed {
      height: 0;
      border-top: none;
    }

    .terminal-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--panel-bg-alt);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .terminal-header .t-title {
      font-size: calc(11px * var(--terminal-scale));
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
    }

    .term-clear {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: calc(11px * var(--terminal-scale));
      font-family: var(--sans);
      transition: color 0.15s;
    }

    .term-clear:hover { color: var(--text); }

    #terminal-output {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: calc(12px * var(--terminal-scale));
      line-height: 1.55;
      scroll-behavior: smooth;
    }

    #terminal-output::-webkit-scrollbar,
    .sidebar::-webkit-scrollbar { width: 8px; }

    #terminal-output::-webkit-scrollbar-track,
    .sidebar::-webkit-scrollbar-track { background: transparent; }

    #terminal-output::-webkit-scrollbar-thumb,
    .sidebar::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 999px;
    }

    .log-line { display: flex; gap: 8px; padding: 1px 0; }
    .log-time { color: var(--text-muted); flex-shrink: 0; }
    .log-msg.info { color: var(--text-dim); }
    .log-msg.success { color: var(--status-success); }
    .log-msg.warning { color: var(--status-warning); }
    .log-msg.error { color: var(--status-error); }
    .log-msg.result { color: var(--status-result); }
    .log-msg.event { color: var(--status-event); }

    .log-prefix { font-weight: 700; flex-shrink: 0; color: var(--text-muted); }
    .log-prefix.success { color: var(--status-success); }
    .log-prefix.warning { color: var(--status-warning); }
    .log-prefix.error { color: var(--status-error); }
    .log-prefix.result { color: var(--status-result); }
    .log-prefix.event { color: var(--status-event); }

    .log-details {
      margin-top: 2px;
      margin-left: 56px;
      margin-bottom: 4px;
      background: var(--panel-bg-alt);
      border-radius: 3px;
      padding: 6px 10px;
      font-size: calc(11px * var(--terminal-scale));
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-all;
      border-left: 2px solid var(--button-primary);
    }

    #toast {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 999;
      background: var(--panel-bg);
      border: 1px solid var(--border-strong);
      border-radius: 3px;
      padding: 9px 12px;
      font-size: 12px;
      color: var(--text);
      transform: translateY(8px);
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
    }

    #toast.show { transform: translateY(0); opacity: 1; }

    .empty-state {
      padding: 10px;
      background: var(--panel-bg-alt);
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: calc(12px * var(--sidebar-scale));
      color: var(--text-muted);
      text-align: center;
    }

    @media (max-width: 1200px) {
      .sidebar { width: 312px; }
    }

    @media (max-width: 980px) {
      header {
        height: auto;
        padding: 8px 10px;
      }

      .workspace {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        max-height: 45vh;
      }

      .editor-area {
        min-height: 0;
        height: 55vh;
      }
    }

    @media (max-width: 768px) {
      .workspace { gap: 6px; padding: 6px; }
      .sidebar { max-height: none; }
      .sidebar-section { padding: 8px; }
      .terminal-panel { height: 180px; }
    }

    @media (max-width: 560px) {
      header .logo img {
        width: 22px;
        height: 22px;
      }

      header .logo-text { font-size: 13px; }

      .btn {
        font-size: 11px;
        padding: 7px 8px;
      }

      .btn-row { grid-template-columns: 1fr; }
      .terminal-panel { height: 160px; }

      header .feedback-link,
      header .beta-pill {
        font-size: 10px;
        padding: 3px 6px;
      }
    }
  </style>
</head>
<body data-theme="dark">
<div id="app">

  <!-- ── Header ── -->
  <header>
    <div class="logo">
      <img src="../../assets/final_icon.png" alt="Blockwave Icon" />
      <span class="logo-text"><span>Solidity</span> Playground</span>
    </div>
    <div class="spacer"></div>
    <div class="app-status" title="Version 1.1">
      <span class="beta-pill">v1.1</span>
      <a
        class="feedback-link"
        href="https://smartcontractsbyamar.vercel.app/feedback"
        target="_blank"
        rel="noreferrer"
      >
        Send Feedback
      </a>
    </div>
    <div class="window-controls" aria-label="Window controls">
      <button class="window-btn" id="btn-window-minimize" title="Minimize" aria-label="Minimize">
        <svg viewBox="0 0 10 10"><path d="M1 5.5H9" /></svg>
      </button>
      <button class="window-btn" id="btn-window-maximize" title="Maximize" aria-label="Maximize">
        <svg viewBox="0 0 10 10"><rect x="1.5" y="1.5" width="7" height="7" /></svg>
      </button>
      <button class="window-btn is-hidden" id="btn-window-restore" title="Restore" aria-label="Restore">
        <svg viewBox="0 0 10 10">
          <path d="M2 3.5h4.5V8H2z" />
          <path d="M3.5 2H8v4.5" />
        </svg>
      </button>
      <button class="window-btn close-btn" id="btn-window-close" title="Close" aria-label="Close">
        <svg viewBox="0 0 10 10"><path d="M2 2l6 6M8 2L2 8" /></svg>
      </button>
    </div>
  </header>

  <div class="workspace">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">

      <!-- File actions -->
      <div class="sidebar-section">
        <div class="section-title"><span class="dot"></span>File</div>

        <div class="btn-row" style="margin-bottom:6px;">
          <button class="btn btn-reset" id="btn-open">Open .sol</button>
          <button class="btn btn-reset" id="btn-save">Save</button>
        </div>

        <button class="btn btn-reset" id="btn-save-as">Save As .sol</button>
        <div class="file-meta" id="current-file" title="Unsaved document">File: Unsaved document</div>
      </div>

      <!-- Appearance -->
      <div class="sidebar-section">
        <div class="section-title"><span class="dot"></span>Appearance</div>

        <div class="field-wrap">
          <label class="field-label" for="theme-select">Theme</label>
          <select id="theme-select" class="inp">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </div>

        <div class="field-wrap">
          <label class="field-label" for="font-family-select">Editor Font</label>
          <select id="font-family-select" class="inp">
            <option value="consolas">Consolas</option>
            <option value="cascadia">Cascadia Code</option>
            <option value="jetbrains">JetBrains Mono</option>
            <option value="fira">Fira Code</option>
            <option value="courier">Courier New</option>
          </select>
        </div>

        <div class="field-wrap">
          <label class="field-label" for="editor-font-size-range">
            Editor Font Size
            <span class="value" id="editor-font-size-value">13px</span>
          </label>
          <input id="editor-font-size-range" class="inp slider" type="range" min="11" max="24" step="1" value="13" />
          <div class="field-help">Tip: Ctrl + mouse wheel, Ctrl + +, and Ctrl + - adjust editor size. Ctrl + ` toggles terminal.</div>
        </div>
      </div>

      <!-- Compile & Deploy -->
      <div class="sidebar-section">
        <div class="section-title"><span class="dot"></span>Compile & Deploy</div>

        <div id="contract-select-wrap" class="field-wrap" style="display:none;">
          <label class="field-label">Select Contract</label>
          <select id="contract-select" class="inp">
            <option value="">Auto-select deployable</option>
          </select>
        </div>

        <div id="constructor-args-wrap"></div>

        <div class="btn-row">
          <button class="btn btn-compile" id="btn-compile">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            Compile
          </button>
          <button class="btn btn-deploy" id="btn-deploy">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Deploy
          </button>
        </div>

        <div id="compiler-meta" style="display:none;" class="compiler-info">
          <div class="ci-name" id="ci-name"></div>
          <div class="ci-warn" id="ci-warn"></div>
        </div>
      </div>

      <!-- Active deployment info -->
      <div class="sidebar-section" id="deployment-section" style="display:none;">
        <div class="section-title"><span class="dot"></span>Active Deployment</div>
        <div class="deploy-badge">
          <div class="label">Contract Address</div>
          <div class="addr" id="deploy-addr"></div>
          <div class="name" id="deploy-name"></div>
        </div>
        <div>
          <label class="field-label">Sender Account</label>
          <ul class="accounts-list" id="accounts-list"></ul>
        </div>
      </div>

      <!-- Function Tester -->
      <div class="sidebar-section">
        <div class="section-title"><span class="dot"></span>Function Tester</div>

        <div id="fn-no-deploy" class="empty-state">Deploy a contract first.</div>

        <div id="fn-controls" style="display:none;">
          <div class="field-wrap">
            <label class="field-label">Function</label>
            <select id="fn-select" class="inp">
              <option value="">Select a function…</option>
            </select>
          </div>

          <div id="fn-args-wrap"></div>

          <div id="fn-payable-wrap" class="field-wrap" style="display:none;">
            <label class="field-label">Value (wei)</label>
            <input id="fn-value" type="text" value="0" class="inp" placeholder="0" />
          </div>

          <div class="btn-row" style="margin-bottom:0;">
            <button class="btn btn-run" id="btn-run">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Run
            </button>
            <button class="btn btn-reset" id="btn-reset">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.62"/></svg>
              Reset
            </button>
          </div>
        </div>
      </div>

    </aside>

    <!-- ── Editor + Terminal ── -->
    <div class="editor-area">
      <div id="editor-mount"></div>

      <!-- Terminal -->
      <div class="terminal-panel">
        <div class="terminal-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2.5"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          <span class="t-title">Terminal</span>
          <button class="term-clear" id="btn-clear-terminal">clear</button>
        </div>
        <div id="terminal-output"></div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<!-- Monaco loader from app dependencies (offline-safe) -->
<script src="../../node_modules/monaco-editor/min/vs/loader.js"></script>
<script src="renderer.js"></script>
</body>
</html>
